<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강박사 최애단지 이상형 월드컵</title>
<style>
  /* =========================================================
     0. 공통 변수 (강남 느낌 : 네이비 + 골드)
     ========================================================= */
  :root{
    --navy: #0b1f3a;
    --navy-light: #142c52;
    --gold: #c9a227;
    --gold-light: #e6c866;
    --bg: #ffffff;
    --gray-bg: #f4f5f7;
    --text-main: #1c1c1c;
    --text-sub: #7a7a7a;
    --radius: 20px;
    --shadow: 0 10px 30px rgba(11,31,58,0.12);
    --shadow-hover: 0 16px 40px rgba(11,31,58,0.22);
  }

  * { box-sizing: border-box; margin:0; padding:0; }

  html, body{
    width:100%; height:100%;
    font-family: "Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background: var(--bg);
    color: var(--text-main);
    overflow-x:hidden;
  }

  #app{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding: 24px 16px 48px;
  }

  /* =========================================================
     1. 공통 화면 컨테이너 (fade 전환용)
     ========================================================= */
  .screen{
    width:100%;
    max-width: 960px;
    display:none;
    flex-direction:column;
    align-items:center;
    animation: fadeIn .5s ease;
  }
  .screen.active{ display:flex; }

  @keyframes fadeIn{
    from{ opacity:0; transform: translateY(12px); }
    to{ opacity:1; transform: translateY(0); }
  }

  /* =========================================================
     2. 시작 화면
     ========================================================= */
  #start-screen{
    text-align:center;
    gap: 28px;
    padding-top: 8vh;
  }
  .brand-badge{
    display:inline-block;
    padding: 6px 16px;
    border-radius: 999px;
    background: var(--gray-bg);
    color: var(--navy);
    font-size: 13px;
    font-weight:700;
    letter-spacing: .05em;
  }
  #start-screen h1{
    font-size: clamp(28px, 5vw, 44px);
    color: var(--navy);
    line-height: 1.35;
    font-weight: 800;
  }
  #start-screen h1 .gold{ color: var(--gold); }
  #start-screen p.desc{
    color: var(--text-sub);
    font-size: 16px;
    max-width: 480px;
    line-height:1.6;
  }
  .start-stats{
    display:flex;
    gap: 28px;
    margin-top: 6px;
  }
  .start-stats .stat{
    text-align:center;
  }
  .start-stats .stat .num{
    font-size: 26px;
    font-weight:800;
    color: var(--navy);
  }
  .start-stats .stat .label{
    font-size: 12px;
    color: var(--text-sub);
    margin-top:2px;
  }
  #start-btn{
    margin-top: 12px;
    padding: 18px 56px;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: .05em;
    color: #fff;
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
    border: 2px solid var(--gold);
    border-radius: 999px;
    cursor:pointer;
    box-shadow: var(--shadow);
    transition: transform .18s ease, box-shadow .18s ease;
  }
  #start-btn:hover{
    transform: translateY(-3px) scale(1.03);
    box-shadow: var(--shadow-hover);
  }
  #start-btn:active{ transform: translateY(0) scale(0.98); }

  /* =========================================================
     3. 게임(대결) 화면
     ========================================================= */
  #game-screen{ gap: 22px; }

  .progress-wrap{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
  }
  .round-label{
    font-size: clamp(20px, 4vw, 28px);
    font-weight:800;
    color: var(--navy);
    display:flex;
    align-items:center;
    gap: 10px;
  }
  .round-label .chip{
    background: var(--gold);
    color: var(--navy);
    font-size: 12px;
    font-weight:800;
    padding: 4px 12px;
    border-radius: 999px;
  }
  .progress-bar-outer{
    width: 100%;
    max-width: 420px;
    height: 8px;
    background: var(--gray-bg);
    border-radius: 999px;
    overflow:hidden;
  }
  .progress-bar-inner{
    height:100%;
    background: linear-gradient(90deg, var(--navy) 0%, var(--gold) 100%);
    width:0%;
    transition: width .4s ease;
  }
  .progress-text{
    font-size: 13px;
    color: var(--text-sub);
  }

  .vs-area{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 20px;
    position:relative;
  }

  .vs-badge{
    flex: 0 0 auto;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--navy);
    color: var(--gold);
    font-weight:800;
    font-size: 15px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow: var(--shadow);
    z-index: 2;
  }

  /* 카드 */
  .apt-card{
    flex: 1 1 0;
    max-width: 380px;
    background: #fff;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid #eee;
    padding: 0;
    cursor: pointer;
    overflow:hidden;
    transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease;
    display:flex;
    flex-direction:column;
  }
  .apt-card:hover{
    transform: translateY(-6px) scale(1.02);
    box-shadow: var(--shadow-hover);
    border-color: var(--gold);
  }
  .apt-card:active{ transform: translateY(-2px) scale(0.99); }

  .apt-card.selected{
    animation: pickPulse .55s ease;
    border-color: var(--gold);
  }
  .apt-card.faded{
    opacity: 0.15;
    transform: scale(0.92);
    pointer-events:none;
  }
  @keyframes pickPulse{
    0%{ box-shadow: 0 0 0 0 rgba(201,162,39,0.6); }
    60%{ box-shadow: 0 0 0 22px rgba(201,162,39,0); }
    100%{ box-shadow: var(--shadow-hover); }
  }

  .apt-card .thumb{
    width:100%;
    aspect-ratio: 4 / 3;
    background: linear-gradient(135deg, #e9ecf2 0%, #f6f7fa 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    color: #a9b0bd;
    font-size: 13px;
    font-weight:600;
    flex-direction:column;
    gap:8px;
  }
  .apt-card .thumb .icon{ font-size: 40px; opacity:.6; }

  .apt-card .info{
    padding: 18px 16px 22px;
    text-align:center;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .apt-card .region-tag{
    align-self:center;
    font-size: 12px;
    font-weight:700;
    color: var(--navy);
    background: var(--gray-bg);
    padding: 3px 10px;
    border-radius: 999px;
  }
  .apt-card .apt-name{
    font-size: clamp(17px, 2.6vw, 21px);
    font-weight:800;
    color: var(--text-main);
    line-height:1.3;
  }

  /* 모바일에서는 세로 배치 */
  @media (max-width: 720px){
    .vs-area{ flex-direction:column; }
    .apt-card{ max-width: 100%; width:100%; }
    .vs-badge{ order:0; }
  }

  /* 부전승(자동 진출) 안내 배너 */
  .bye-banner{
    padding: 10px 22px;
    background: var(--navy);
    color: #fff;
    border-radius: 999px;
    font-size: 14px;
    font-weight:700;
    box-shadow: var(--shadow);
    animation: fadeIn .3s ease;
  }
  .bye-banner .gold-txt{ color: var(--gold-light); }

  /* =========================================================
     4. 결과 화면
     ========================================================= */
  #result-screen{
    text-align:center;
    gap: 18px;
    padding-top: 4vh;
  }
  .trophy{
    font-size: 64px;
    animation: trophyPop .6s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes trophyPop{
    0%{ transform: scale(0) rotate(-15deg); opacity:0; }
    70%{ transform: scale(1.15) rotate(6deg); opacity:1; }
    100%{ transform: scale(1) rotate(0deg); }
  }
  #result-screen .sub-copy{
    color: var(--text-sub);
    font-size: 16px;
  }
  #result-screen .winner-name{
    font-size: clamp(30px, 6vw, 46px);
    font-weight:900;
    color: var(--navy);
    margin: 4px 0 6px;
  }
  #result-screen .winner-name .gold{ color: var(--gold); }

  .winner-card{
    margin-top: 10px;
    width: min(320px, 80vw);
    background:#fff;
    border-radius: var(--radius);
    box-shadow: var(--shadow-hover);
    border: 2px solid var(--gold);
    overflow:hidden;
    animation: fadeIn .6s ease;
  }
  .winner-card .thumb{
    aspect-ratio: 4/3;
    background: linear-gradient(135deg, #fff7e0 0%, #fdf1c8 100%);
    display:flex; align-items:center; justify-content:center;
    color:#c9a227; font-size:44px;
  }
  .winner-card .info{ padding: 16px; }
  .winner-card .region-tag{
    font-size:12px; font-weight:700; color:var(--navy);
    background: var(--gray-bg); padding:3px 10px; border-radius:999px;
    display:inline-block; margin-bottom:6px;
  }

  /* 최종 순위 리스트 */
  .ranking-box{
    margin-top: 28px;
    width:100%;
    max-width: 480px;
    display:flex;
    flex-direction:column;
    gap: 12px;
  }
  .ranking-title{
    font-size: 15px;
    font-weight:800;
    color: var(--navy);
    letter-spacing:.04em;
    margin-bottom: 4px;
  }
  .rank-item{
    display:flex;
    align-items:center;
    gap: 14px;
    background: var(--gray-bg);
    border-radius: 14px;
    padding: 12px 16px;
    text-align:left;
  }
  .rank-item .medal{
    font-size: 22px;
    width: 32px;
    text-align:center;
  }
  .rank-item .rank-info{ display:flex; flex-direction:column; gap:2px; }
  .rank-item .rank-info .name{ font-weight:800; font-size:15px; }
  .rank-item .rank-info .region{ font-size:12px; color: var(--text-sub); }

  #restart-btn{
    margin-top: 30px;
    padding: 16px 48px;
    font-size: 16px;
    font-weight:800;
    color: var(--navy);
    background: #fff;
    border: 2px solid var(--navy);
    border-radius: 999px;
    cursor:pointer;
    transition: all .18s ease;
  }
  #restart-btn:hover{
    background: var(--navy);
    color: #fff;
    transform: translateY(-2px);
  }

  footer.credit{
    margin-top: 36px;
    font-size: 12px;
    color: #b7b7b7;
  }
</style>
</head>
<body>

<div id="app">

  <!-- =========================================================
       화면 1) 시작 화면
       ========================================================= -->
  <section id="start-screen" class="screen active">
    <span class="brand-badge">GANGNAM APARTMENT WORLD CUP</span>
    <h1>강박사 <span class="gold">최애단지</span><br>이상형 월드컵</h1>
    <p class="desc">
      강박사 임장 과정에서 둘러본 35개 단지 중,<br>
      당신의 마음을 가장 사로잡은 단지는 어디인가요?
    </p>
    <div class="start-stats">
      <div class="stat"><div class="num">35</div><div class="label">참가 단지</div></div>
      <div class="stat"><div class="num">5</div><div class="label">지역</div></div>
      <div class="stat"><div class="num">1</div><div class="label">최애 단지</div></div>
    </div>
    <button id="start-btn">START</button>
  </section>

  <!-- =========================================================
       화면 2) 대결(토너먼트) 화면
       ========================================================= -->
  <section id="game-screen" class="screen">
    <div class="progress-wrap">
      <div class="round-label">
        <span id="round-name">64강</span>
        <span class="chip" id="round-chip">MATCH 1</span>
      </div>
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="progress-bar"></div>
      </div>
      <div class="progress-text" id="progress-text">0 / 34</div>
    </div>

    <div class="vs-area" id="vs-area">
      <!-- 좌측 카드 -->
      <div class="apt-card" id="card-left" data-side="left">
        <div class="thumb"><span class="icon">🏢</span><span>이미지 준비중</span></div>
        <div class="info">
          <span class="region-tag" id="left-region">지역</span>
          <span class="apt-name" id="left-name">단지명</span>
        </div>
      </div>

      <div class="vs-badge">VS</div>

      <!-- 우측 카드 -->
      <div class="apt-card" id="card-right" data-side="right">
        <div class="thumb"><span class="icon">🏢</span><span>이미지 준비중</span></div>
        <div class="info">
          <span class="region-tag" id="right-region">지역</span>
          <span class="apt-name" id="right-name">단지명</span>
        </div>
      </div>
    </div>
  </section>

  <!-- =========================================================
       화면 3) 결과 화면
       ========================================================= -->
  <section id="result-screen" class="screen">
    <div class="trophy">🏆</div>
    <p class="sub-copy">당신의 최애 단지는</p>
    <div class="winner-name" id="winner-name-text">-</div>
    <p class="sub-copy">입니다.</p>

    <div class="winner-card">
      <div class="thumb">🏢</div>
      <div class="info">
        <span class="region-tag" id="winner-region">지역</span>
      </div>
    </div>

    <div class="ranking-box">
      <div class="ranking-title">🏁 최종 순위</div>
      <div id="ranking-list"></div>
    </div>

    <button id="restart-btn">다시하기</button>
    <footer class="credit">강박사 임장 최애 단지 이상형 월드컵</footer>
  </section>

</div>

<script>
/* =============================================================
   강박사 임장 최애 단지 이상형 월드컵 - 로직 스크립트
   구조
   1. 데이터 정의 (35개 단지)
   2. 유틸 함수 (셔플)
   3. 토너먼트 상태 관리 객체 (Tournament)
   4. 화면 전환 / 렌더링 함수
   5. 이벤트 바인딩 (시작, 카드 클릭, 다시하기)
   ============================================================= */

/* -------------------------------------------------------------
   1. 데이터 정의
   ------------------------------------------------------------- */
// 지역별로 정리된 35개 단지 목록. 유지보수 시 이 배열만 수정하면 됩니다.
const APARTMENTS = [
  // 청담
  { name: "청담르엘", region: "청담" },
  { name: "아크로삼성", region: "청담" },
  { name: "청담자이", region: "청담" },
  { name: "래미안로이뷰", region: "청담" },
  { name: "청담삼성진흥", region: "청담" },
  { name: "청담진흥", region: "청담" },
  { name: "청구아파트", region: "청담" },
  // 대치
  { name: "개포우성1,2차", region: "대치" },
  { name: "미도맨션1,2차", region: "대치" },
  { name: "선경1,2차", region: "대치" },
  { name: "은마아파트", region: "대치" },
  { name: "대치아이파크", region: "대치" },
  { name: "대치동부센트레빌", region: "대치" },
  { name: "래미안대치팰리스1·2단지", region: "대치" },
  // 반포
  { name: "반포자이", region: "반포" },
  { name: "반포래미안퍼스티지", region: "반포" },
  { name: "래미안원펜타스", region: "반포" },
  { name: "래미안퍼스티지", region: "반포" },
  { name: "래미안원베일리", region: "반포" },
  { name: "아크로리버파크", region: "반포" },
  { name: "반포디에이치클래스트", region: "반포" },
  // 압구정
  { name: "압구정신현대9·11·12차", region: "압구정" },
  { name: "압구정현대1~5차", region: "압구정" },
  { name: "현대8차·한양3·4·6차", region: "압구정" },
  { name: "압구정한양1·2차", region: "압구정" },
  { name: "압구정미성1·2차", region: "압구정" },
  { name: "압구정한양5·7·8차", region: "압구정" },
  { name: "압구정현대6·7·10~14차", region: "압구정" },
  // 삼성·잠실
  { name: "롯데캐슬프레미어", region: "삼성·잠실" },
  { name: "잠실아시아선수촌", region: "삼성·잠실" },
  { name: "삼성힐스테이트2차", region: "삼성·잠실" },
  { name: "삼성힐스테이트1차", region: "삼성·잠실" },
  { name: "아이파크삼성", region: "삼성·잠실" },
  { name: "래미안라클래시", region: "삼성·잠실" },
  { name: "우성1·2·3차", region: "삼성·잠실" },
];

/* -------------------------------------------------------------
   2. 유틸 함수
   ------------------------------------------------------------- */
// Fisher-Yates 셔플 (배열을 무작위로 섞는다)
function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// 라운드 참가자 수 -> 라운드 이름으로 변환
function roundLabelBySize(size) {
  switch (size) {
    case 64: return "64강";
    case 32: return "32강";
    case 16: return "16강";
    case 8:  return "8강";
    case 4:  return "4강";
    case 2:  return "결승";
    default: return `${size}강`;
  }
}

/* -------------------------------------------------------------
   3. 토너먼트 상태 관리 객체
   ------------------------------------------------------------- */
const Tournament = {
  bracketSize: 64,      // 전체 대진표 크기 (35명을 담을 수 있는 2의 제곱수)
  currentRoundPlayers: [],  // 현재 라운드에 참여 중인 실제 선수 목록 (순서대로)
  matchQueue: [],        // 현재 라운드에서 처리해야 할 대진 큐 [ [a,b], [a,b], ... ]
  matchQueueTotal: 0,    // 현재 라운드 전체 매치 수 (진행률 표시용)
  nextRoundWinners: [],  // 현재 라운드 승자들을 모아 다음 라운드로 넘길 배열
  currentMatch: null,    // 현재 사용자에게 보여주고 있는 매치 [a, b]
  semifinalLosers: [],   // 4강 패자 2명 -> 공동 3위
  finalLoser: null,      // 결승 패자 -> 2위
  champion: null,        // 최종 우승자 -> 1위
  totalMatchSteps: 0,    // 전체 매치(부전승 포함) 진행 카운트 - progress bar용
  doneMatchSteps: 0,

  // 토너먼트 초기화: 35개 단지를 셔플 후 부전승을 배분하여 64강 대진표 구성
  init() {
    const shuffled = shuffleArray(APARTMENTS);
    const realCount = shuffled.length;             // 35
    const byeCount = this.bracketSize - realCount;  // 29

    // (1) 부전승 매치: 앞쪽 byeCount 명은 부전승 상대(null)와 매칭되어 자동 진출
    // (2) 나머지는 실제 매치로 편성
    const firstRoundPairs = [];
    for (let i = 0; i < byeCount; i++) {
      firstRoundPairs.push([shuffled[i], null]); // 부전승
    }
    for (let i = byeCount; i < realCount; i += 2) {
      firstRoundPairs.push([shuffled[i], shuffled[i + 1]]); // 실제 대결
    }

    // 매치 순서를 한 번 더 섞어서 부전승이 한쪽에 몰리지 않도록 함
    this.matchQueue = shuffleArray(firstRoundPairs);
    this.matchQueueTotal = this.matchQueue.length; // 32
    this.currentRoundPlayers = new Array(this.bracketSize).fill(true); // 라운드 크기 표시용(64)
    this.nextRoundWinners = [];
    this.semifinalLosers = [];
    this.finalLoser = null;
    this.champion = null;

    // 전체 진행 카운트를 위해 예상 총 매치(부전승 포함) 수 계산
    // 64 -> 32 -> 16 -> 8 -> 4 -> 2 -> 1 순으로 매치 수는 32+16+8+4+2+1 = 63
    this.totalMatchSteps = this.bracketSize - 1; // 63
    this.doneMatchSteps = 0;
  },

  // 현재 라운드의 참가자 수 (표시용 라벨 계산에 사용)
  currentRoundSize() {
    return this.currentRoundPlayers.length;
  },

  // 다음 처리할 매치를 큐에서 꺼낸다. 큐가 비어있으면 다음 라운드를 구성한다.
  // 반환값: { type: 'match', pair } | { type: 'bye', winner } | { type: 'finished' }
  nextStep() {
    // 현재 라운드 큐가 비었다면 -> 다음 라운드 구성 시도
    if (this.matchQueue.length === 0) {
      // 다음 라운드 참가자 = 이번 라운드 승자들
      const winners = this.nextRoundWinners;
      this.currentRoundPlayers = winners;
      this.nextRoundWinners = [];

      // 남은 선수가 1명이면 토너먼트 종료
      if (winners.length === 1) {
        this.champion = winners[0];
        return { type: "finished" };
      }

      // 다음 라운드 매치 큐 구성 (이제부터는 전원 실제 단지이므로 부전승 없음)
      const pairs = [];
      for (let i = 0; i < winners.length; i += 2) {
        pairs.push([winners[i], winners[i + 1]]);
      }
      this.matchQueue = pairs;
      this.matchQueueTotal = pairs.length;
    }

    // 큐에서 다음 매치 하나를 꺼낸다
    const pair = this.matchQueue.shift();

    // 부전승 처리 (상대가 null인 경우)
    if (pair[1] === null) {
      this.nextRoundWinners.push(pair[0]);
      this.doneMatchSteps++;
      return { type: "bye", winner: pair[0] };
    }

    // 실제 대결 -> 사용자 입력 대기
    this.currentMatch = pair;
    return { type: "match", pair };
  },

  // 사용자가 승자를 선택했을 때 호출
  selectWinner(winner) {
    const [a, b] = this.currentMatch;
    const loser = (winner === a) ? b : a;
    const roundSize = this.currentRoundSize();

    // 4강(참가자 4명) 라운드의 패자 -> 공동 3위 후보
    if (roundSize === 4) {
      this.semifinalLosers.push(loser);
    }
    // 결승(참가자 2명) 라운드의 패자 -> 2위
    if (roundSize === 2) {
      this.finalLoser = loser;
    }

    this.nextRoundWinners.push(winner);
    this.doneMatchSteps++;
  },
};

/* -------------------------------------------------------------
   4. 화면 전환 / 렌더링 함수
   ------------------------------------------------------------- */
const screens = {
  start: document.getElementById("start-screen"),
  game: document.getElementById("game-screen"),
  result: document.getElementById("result-screen"),
};

function showScreen(name) {
  Object.values(screens).forEach(s => s.classList.remove("active"));
  screens[name].classList.add("active");
}

// 카드 DOM 요소 캐시
const el = {
  roundName: document.getElementById("round-name"),
  roundChip: document.getElementById("round-chip"),
  progressBar: document.getElementById("progress-bar"),
  progressText: document.getElementById("progress-text"),
  vsArea: document.getElementById("vs-area"),
  cardLeft: document.getElementById("card-left"),
  cardRight: document.getElementById("card-right"),
  leftName: document.getElementById("left-name"),
  leftRegion: document.getElementById("left-region"),
  rightName: document.getElementById("right-name"),
  rightRegion: document.getElementById("right-region"),
};

// 진행률 및 라운드명 갱신
function updateProgressUI() {
  const roundSize = Tournament.currentRoundSize();
  el.roundName.textContent = roundLabelBySize(roundSize);
  el.roundChip.textContent = `TOTAL ${Tournament.doneMatchSteps} / ${Tournament.totalMatchSteps}`;
  const pct = Math.min(100, Math.round((Tournament.doneMatchSteps / Tournament.totalMatchSteps) * 100));
  el.progressBar.style.width = pct + "%";
  el.progressText.textContent = `${Tournament.doneMatchSteps} / ${Tournament.totalMatchSteps} 경기 진행`;
}

// 매치 카드 렌더링
function renderMatch(pair) {
  const [a, b] = pair;
  el.leftName.textContent = a.name;
  el.leftRegion.textContent = a.region;
  el.rightName.textContent = b.name;
  el.rightRegion.textContent = b.region;

  // 카드 클릭 가능 상태로 초기화
  el.cardLeft.classList.remove("selected", "faded");
  el.cardRight.classList.remove("selected", "faded");
  el.cardLeft.style.pointerEvents = "auto";
  el.cardRight.style.pointerEvents = "auto";
}

// 부전승 안내 배너를 잠시 보여준 뒤 다음 스텝으로 자동 진행
function showByeBanner(winner) {
  el.vsArea.innerHTML = `
    <div class="bye-banner">
      <span class="gold-txt">${winner.name}</span> (${winner.region}) 부전승으로 다음 라운드 진출!
    </div>`;
}

// vs-area를 다시 원래의 카드 두 개 구조로 복원
function restoreVsAreaMarkup() {
  el.vsArea.innerHTML = `
    <div class="apt-card" id="card-left" data-side="left">
      <div class="thumb"><span class="icon">🏢</span><span>이미지 준비중</span></div>
      <div class="info">
        <span class="region-tag" id="left-region">지역</span>
        <span class="apt-name" id="left-name">단지명</span>
      </div>
    </div>
    <div class="vs-badge">VS</div>
    <div class="apt-card" id="card-right" data-side="right">
      <div class="thumb"><span class="icon">🏢</span><span>이미지 준비중</span></div>
      <div class="info">
        <span class="region-tag" id="right-region">지역</span>
        <span class="apt-name" id="right-name">단지명</span>
      </div>
    </div>`;
  // 요소 다시 캐싱 (innerHTML로 새로 그렸기 때문)
  el.cardLeft = document.getElementById("card-left");
  el.cardRight = document.getElementById("card-right");
  el.leftName = document.getElementById("left-name");
  el.leftRegion = document.getElementById("left-region");
  el.rightName = document.getElementById("right-name");
  el.rightRegion = document.getElementById("right-region");

  el.cardLeft.addEventListener("click", () => onCardClick("left"));
  el.cardRight.addEventListener("click", () => onCardClick("right"));
}

/* -------------------------------------------------------------
   메인 진행 루프
   ------------------------------------------------------------- */
function advance() {
  const step = Tournament.nextStep();

  if (step.type === "finished") {
    renderResult();
    return;
  }

  updateProgressUI();

  if (step.type === "bye") {
    // 부전승 -> 배너를 잠깐 보여주고 바로 다음 스텝 진행
    showByeBanner(step.winner);
    setTimeout(() => {
      restoreVsAreaMarkup();
      advance();
    }, 650);
    return;
  }

  // 실제 매치 -> 카드 렌더링 후 사용자 입력 대기
  // (vs-area가 부전승 배너 상태였을 수 있으므로 항상 복원)
  restoreVsAreaMarkup();
  renderMatch(step.pair);
}

// 카드 클릭 핸들러
function onCardClick(side) {
  const [a, b] = Tournament.currentMatch;
  const winner = side === "left" ? a : b;
  const winnerCardEl = side === "left" ? el.cardLeft : el.cardRight;
  const loserCardEl = side === "left" ? el.cardRight : el.cardLeft;

  // 클릭 즉시 재클릭 방지
  el.cardLeft.style.pointerEvents = "none";
  el.cardRight.style.pointerEvents = "none";

  // 선택 애니메이션
  winnerCardEl.classList.add("selected");
  loserCardEl.classList.add("faded");

  Tournament.selectWinner(winner);

  // 애니메이션 이후 다음 매치로 전환
  setTimeout(() => {
    advance();
  }, 550);
}

/* -------------------------------------------------------------
   결과 화면 렌더링
   ------------------------------------------------------------- */
function renderResult() {
  showScreen("result");

  const champion = Tournament.champion;
  document.getElementById("winner-name-text").innerHTML =
    `<span class="gold">${champion.name}</span>`;
  document.getElementById("winner-region").textContent = champion.region;

  // 순위 리스트 구성: 1위(우승자), 2위(결승 패자), 공동 3위(4강 패자 2명)
  const rankingList = document.getElementById("ranking-list");
  rankingList.innerHTML = "";

  const rankData = [
    { medal: "🥇", label: "1위", item: champion },
    { medal: "🥈", label: "2위", item: Tournament.finalLoser },
  ];

  rankData.forEach(r => {
    if (!r.item) return;
    rankingList.appendChild(buildRankItem(r.medal, r.label, r.item));
  });

  // 공동 3위 (4강 패자 2명)
  Tournament.semifinalLosers.forEach(loser => {
    rankingList.appendChild(buildRankItem("🥉", "공동 3위", loser));
  });
}

function buildRankItem(medal, label, item) {
  const wrap = document.createElement("div");
  wrap.className = "rank-item";
  wrap.innerHTML = `
    <span class="medal">${medal}</span>
    <div class="rank-info">
      <span class="name">${label} · ${item.name}</span>
      <span class="region">${item.region}</span>
    </div>`;
  return wrap;
}

/* -------------------------------------------------------------
   5. 이벤트 바인딩
   ------------------------------------------------------------- */
document.getElementById("start-btn").addEventListener("click", () => {
  Tournament.init();
  showScreen("game");
  advance();
});

document.getElementById("restart-btn").addEventListener("click", () => {
  showScreen("start");
});

// 초기 카드 클릭 리스너 (최초 DOM 기준)
el.cardLeft.addEventListener("click", () => onCardClick("left"));
el.cardRight.addEventListener("click", () => onCardClick("right"));

</script>
</body>
</html>
